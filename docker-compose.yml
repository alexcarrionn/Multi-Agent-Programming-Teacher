services:
  mysql:
    image: mysql:8.0
    container_name: codi-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codi-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${WEB_PORT:-3000}}
    ports:
      # Solo cambia el puerto del host (izquierda). El contenedor sigue en 8000.
      - "${API_PORT:-8000}:8000"
    volumes:
      - hf_cache:/app/.cache/huggingface
      - ./code/data:/app/code/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: codi-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://api:8000
    ports:
      # Solo cambia el puerto del host (izquierda). El contenedor sigue en 3000.
      - "${WEB_PORT:-3000}:3000"
  
volumes:
  mysql_data:
  hf_cache:
